<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Login</title>
<link rel="stylesheet" href="./css/styles.css">
 <link rel="icon" type="image/png" href="img/favicon.png">
 <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
 
</head>
<body>

<section class="contact-modern">
    <div class="container ">
        <div class="cta-card animate__animated animate__fadeInDownBig">
            <h2>Iniciar Sesión</h2>

            <form id="formLogin">
               <input  id="usuario" type="text" placeholder="Nombre de usuario"  class="input">
                <input type="password" id="contrasenia" placeholder="Contraseña" class="input">

                <button class="btn btn-primario">Ingresar</button>
            </form>
             <p id="mensaje" class="mensaje"></p>
            <p style="margin-top:20px;">¿No tenés cuenta? <a href="registrar.html">Registrate</a></p>
            
        </div>
    </div>
</section>



<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<script src="./js/login.js"></script>



</body>
</html>
