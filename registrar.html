<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Registro</title>
<link rel="stylesheet" href="./css/styles.css">
<link rel="icon" type="image/png" href="img/favicon.png">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>

<section class="contact-modern">
    <div class="container ">
        <div class="cta-card animate__animated animate__fadeInLeft""">
            <h2>Crear Cuenta</h2>

            <form  id="formRegistro">
                <input  id="usuario" type="text" placeholder="Nombre de usuario" class="input">
                
                <input id="contrasenia" type="password" placeholder="Contraseña"  class="input">

                <button id="botonRegistrar" type="submit" class="btn btn-primario">Registrarse</button>
                <p id="mensaje" class="mensaje"></p>
            </form>

            <p style="margin-top:20px;">¿Ya tenés cuenta? <a href="login.html">Iniciar sesión</a></p>
        </div>
    </div>
</section>

<script src="./js/registrar.js"></script>
</body>

</html>
